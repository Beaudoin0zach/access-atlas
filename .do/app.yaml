# DigitalOcean App Platform spec — Access Atlas (web only).
# Apply with:  doctl apps create --spec .do/app.yaml
# Update with: doctl apps update <app-id> --spec .do/app.yaml
#
# ONE component: the Astro web app (Dockerfile from GitHub). App data lives in a
# Supabase CLOUD project; identity uses the SHARED platform Keycloak
# (id.beauaccesssolutions.com, realm `bas`) — Access Atlas does NOT run its own
# Keycloak (§15: the platform IdP is shared). So the only new cost is this
# ~$5/mo web container. See docs/deploy-digitalocean.md.
#
# SECRETS are NOT stored in this file. Values marked `type: SECRET` with no value
# are supplied at create time (encrypted at rest by App Platform).
name: access-atlas
region: nyc

services:
  # ---- The Astro app (zero-JS browsing + contributor BFF) ------------------
  - name: web
    github:
      repo: Beaudoin0zach/access-atlas
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_size_slug: apps-s-1vcpu-0.5gb # ~$5/mo; bump if builds/sharp need more
    instance_count: 1
    health_check:
      http_path: / # homepage renders without any backend — a true liveness probe
      initial_delay_seconds: 20
    envs:
      - key: HOST
        value: "0.0.0.0"
        scope: RUN_TIME
      # --- Supabase CLOUD (project gclxpbjifxwrhueopdta) ---
      - key: PUBLIC_SUPABASE_URL
        scope: RUN_TIME
        value: "https://gclxpbjifxwrhueopdta.supabase.co"
      - key: PUBLIC_SUPABASE_ANON_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
      # --- Shared platform Keycloak (id.beauaccesssolutions.com, realm bas) ---
      # Reused, not self-hosted. The redirect URI resolves from the app's own
      # assigned URL; the `access-atlas` client must be registered on the bas
      # realm with this exact redirect (see the runbook).
      # The issuer was flipped from id.kindredaccess.org via a live dashboard
      # env edit first (verified live 2026-07-18: /api/auth/login 302s to the
      # new host); this file caught up after the fact. If it ever disagrees
      # with `doctl apps spec get` again, live wins — re-applying a stale copy
      # of this file reverts the issuer and breaks login.
      - key: KEYCLOAK_ISSUER
        scope: RUN_TIME
        value: "https://id.beauaccesssolutions.com/realms/bas"
      - key: KEYCLOAK_CLIENT_ID
        scope: RUN_TIME
        value: "access-atlas"
      - key: KEYCLOAK_REDIRECT_URI
        scope: RUN_TIME
        value: "${APP_URL}/api/auth/callback"
      # Provisional contribution stays OFF in prod — real Keycloak gates writes.
      - key: ALLOW_PROVISIONAL_CONTRIBUTIONS
        scope: RUN_TIME
        value: "false"
